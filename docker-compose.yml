services:
  ml:
    # Prebuilt: kingxujw/x-mili:latest (Docker Hub, CI on main)
    # Local: docker compose build
    image: ${X_MILI_DOCKER_IMAGE:-kingxujw/x-mili:latest}
    build:
      context: .
      dockerfile: ./Dockerfile
    container_name: ml_app
    # hostname: yourhostname <- optional
    volumes:
      - $PWD/db/:/etc/x-ui/
      - $PWD/cert/:/root/cert/
    environment:
      XRAY_VMESS_AEAD_FORCED: "false"
      XUI_ENABLE_FAIL2BAN: "false"
    tty: true
    # Xray/WARP/VPNGate need host networking and /dev/net/tun; this intentionally trades container isolation for VPN routing.
    network_mode: host
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    restart: unless-stopped

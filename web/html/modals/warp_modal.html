{{define "modals/warpModal"}}
<a-modal id="warp-modal" v-model="warpModal.visible" title="Cloudflare WARP" :confirm-loading="warpModal.confirmLoading"
    :closable="true" :mask-closable="true" :footer="null" :class="themeSwitcher.currentTheme">
    <template v-if="ObjectUtil.isEmpty(warpModal.warpData)">
        <a-button icon="api" @click="register" :loading="warpModal.confirmLoading">申请并测试 WARP</a-button>
        <div v-if="testStatus" :style="{ marginTop: '10px' }">
            <a-alert v-if="testStatus==='success'" type="success" show-icon
                :message="`WARP 可用，延迟 ${testDelay}ms`"></a-alert>
            <a-alert v-else-if="testStatus==='failed'" type="error" show-icon
                :message="testError || '连续申请 10 次仍不可用，请稍后再试'"></a-alert>
            <a-alert v-else type="info" show-icon
                :message="attempt ? `第 ${attempt}/10 次：${testStatus==='testing' ? '正在测试连通性' : '正在申请节点'}` : '正在测试连通性'"></a-alert>
        </div>
    </template>
    <template v-else>
        <table :style="{ margin: '5px 0', width: '100%' }">
            <tr class="client-table-odd-row">
                <td>Access Token</td>
                <td>[[ warpModal.warpData.access_token ]]</td>
            </tr>
            <tr>
                <td>Device ID</td>
                <td>[[ warpModal.warpData.device_id ]]</td>
            </tr>
            <tr class="client-table-odd-row">
                <td>License Key</td>
                <td>[[ warpModal.warpData.license_key ]]</td>
            </tr>
            <tr>
                <td>Private Key</td>
                <td>[[ warpModal.warpData.private_key ]]</td>
            </tr>
        </table>
        <a-button @click="register" :loading="warpModal.confirmLoading" type="primary">重新申请并测试</a-button>
        <a-button @click="delConfig" :loading="warpModal.confirmLoading" type="danger">{{ i18n "delete" }}</a-button>
        <div v-if="testStatus" :style="{ marginTop: '10px' }">
            <a-alert v-if="testStatus==='success'" type="success" show-icon
                :message="`WARP 可用，延迟 ${testDelay}ms`"></a-alert>
            <a-alert v-else-if="testStatus==='failed'" type="error" show-icon
                :message="testError || 'WARP 当前不可用'"></a-alert>
            <a-alert v-else type="info" show-icon
                :message="attempt ? `第 ${attempt}/10 次：${testStatus==='testing' ? '正在测试连通性' : '正在申请节点'}` : '正在测试连通性'"></a-alert>
        </div>
        <a-divider :style="{ margin: '0' }">{{ i18n "pages.xray.outbound.settings" }}</a-divider>
        <a-collapse :style="{ margin: '10px 0' }">
            <a-collapse-panel header='WARP/WARP+ License Key'>
                <a-form :colon="false" :label-col="{ md: {span:6} }" :wrapper-col="{ md: {span:14} }">
                    <a-form-item label="Key">
                        <a-input v-model="warpPlus"></a-input>
                        <a-button @click="updateLicense(warpPlus)" :disabled="warpPlus.length<26"
                            :loading="warpModal.confirmLoading">{{ i18n "update" }}</a-button>
                    </a-form-item>
                </a-form>
            </a-collapse-panel>
        </a-collapse>
        <a-divider :style="{ margin: '0' }">{{ i18n "pages.xray.outbound.accountInfo" }}</a-divider>
        <a-button icon="sync" @click="getConfig" :style="{ marginTop: '5px', marginBottom: '10px' }"
            :loading="warpModal.confirmLoading" type="primary">{{ i18n "info" }}</a-button>
        <template v-if="!ObjectUtil.isEmpty(warpModal.warpConfig)">
            <table :style="{ width: '100%' }">
                <tr class="client-table-odd-row">
                    <td>Device Name</td>
                    <td>[[ warpModal.warpConfig.name ]]</td>
                </tr>
                <tr>
                    <td>Device Model</td>
                    <td>[[ warpModal.warpConfig.model ]]</td>
                </tr>
                <tr class="client-table-odd-row">
                    <td>Device Enabled</td>
                    <td>[[ warpModal.warpConfig.enabled ]]</td>
                </tr>
                <template v-if="!ObjectUtil.isEmpty(warpModal.warpConfig.account)">
                    <tr>
                        <td>Account Type</td>
                        <td>[[ warpModal.warpConfig.account.account_type ]]</td>
                    </tr>
                    <tr class="client-table-odd-row">
                        <td>Role</td>
                        <td>[[ warpModal.warpConfig.account.role ]]</td>
                    </tr>
                    <tr>
                        <td>WARP+ Data</td>
                        <td>[[ SizeFormatter.sizeFormat(warpModal.warpConfig.account.premium_data) ]]</td>
                    </tr>
                    <tr class="client-table-odd-row">
                        <td>Quota</td>
                        <td>[[ SizeFormatter.sizeFormat(warpModal.warpConfig.account.quota) ]]</td>
                    </tr>
                    <tr v-if="!ObjectUtil.isEmpty(warpModal.warpConfig.account.usage)">
                        <td>Usage</td>
                        <td>[[ SizeFormatter.sizeFormat(warpModal.warpConfig.account.usage) ]]</td>
                    </tr>
                </template>
            </table>
            <a-divider :style="{ margin: '10px 0' }">{{ i18n "pages.xray.outbound.outboundStatus" }}</a-divider>
            <a-form :label-col="{ md: {span:8} }" :wrapper-col="{ md: {span:14} }">
                <template v-if="warpOutboundIndex>=0">
                    <a-tag color="green" :style="{ lineHeight: '31px' }">{{ i18n "enabled" }}</a-tag>
                    <a-button @click="resetOutbound" :loading="warpModal.confirmLoading" :disabled="!warpReady"
                        type="danger">{{ i18n "reset" }}</a-button>
                </template>
                <template v-else>
                    <a-tag color="orange" :style="{ lineHeight: '31px' }">{{ i18n "disabled" }}</a-tag>
                    <a-button @click="addOutbound" :loading="warpModal.confirmLoading" :disabled="!warpReady"
                        type="primary">{{ i18n "pages.xray.outbound.addOutbound" }}</a-button>
                </template>
            </a-form>
        </template>
    </template>
</a-modal>
<script>
    const warpModal = {
        visible: false,
        confirmLoading: false,
        warpData: null,
        warpConfig: null,
        warpOutbound: null,
        show() {
            this.visible = true;
            this.warpConfig = null;
            this.getData();
        },
        close() {
            this.visible = false;
            this.loading(false);
        },
        loading(loading = true) {
            this.confirmLoading = loading;
        },
        async getData() {
            this.loading(true);
            const msg = await HttpUtil.post('/panel/xray/warp/data');
            this.loading(false);
            if (msg.success) {
                this.warpData = msg.obj.length > 0 ? JSON.parse(msg.obj) : null;
            }
        },
    };

    new Vue({
        delimiters: ['[[', ']]'],
        el: '#warp-modal',
        data: {
            warpModal: warpModal,
            warpPlus: '',
            attempt: 0,
            testDelay: 0,
            testError: '',
            testStatus: '',
        },
        methods: {
            collectConfig() {
                const config = warpModal.warpConfig.config;
                if (!config || !config.peers || !config.peers.length) return;
                const peer = config.peers[0];
                warpModal.warpOutbound = Outbound.fromJson({
                    tag: 'warp',
                    protocol: Protocols.Wireguard,
                    settings: {
                        mtu: 1420,
                        secretKey: warpModal.warpData.private_key,
                        address: this.getAddresses(config.interface.addresses),
                        reserved: this.getResolved(config.client_id),
                        domainStrategy: 'ForceIP',
                        peers: [{
                            publicKey: peer.public_key,
                            endpoint: peer.endpoint.host,
                        }],
                        noKernelTun: false,
                    }
                });
            },
            getAddresses(addrs) {
                let addresses = [];
                if (addrs.v4) addresses.push(addrs.v4 + "/32");
                if (addrs.v6) addresses.push(addrs.v6 + "/128");
                return addresses;
            },
            getResolved(client_id) {
                let reserved = [];
                let decoded = atob(client_id);
                let hexString = '';
                for (let i = 0; i < decoded.length; i++) {
                    let hex = decoded.charCodeAt(i).toString(16);
                    hexString += (hex.length === 1 ? '0' : '') + hex;
                }

                for (let i = 0; i < hexString.length; i += 2) {
                    let hexByte = hexString.slice(i, i + 2);
                    let decValue = parseInt(hexByte, 16);
                    reserved.push(decValue);
                }
                return reserved;
            },
            resetTestState() {
                this.attempt = 0;
                this.testDelay = 0;
                this.testError = '';
                this.testStatus = '';
                warpModal.warpOutbound = null;
            },
            async testWarpOutbound() {
                const candidate = warpModal.warpOutbound.toJson();
                const outbounds = (app.templateSettings.outbounds || []).filter((o) => o.tag !== 'warp');
                outbounds.push(candidate);
                const msg = await HttpUtil.post('/panel/xray/testOutbound', {
                    outbound: JSON.stringify(candidate),
                    allOutbounds: JSON.stringify(outbounds)
                });
                if (!msg.success || !msg.obj) {
                    return { success: false, error: msg.msg || 'WARP 测试失败' };
                }
                return msg.obj;
            },
            async register() {
                warpModal.loading(true);
                this.resetTestState();
                try {
                    for (let i = 1; i <= 10; i++) {
                        this.attempt = i;
                        this.testStatus = 'registering';
                        const keys = Wireguard.generateKeypair();
                        const msg = await HttpUtil.post('/panel/xray/warp/reg', keys);
                        if (!msg.success) {
                            this.testError = msg.msg || 'WARP 申请失败';
                            continue;
                        }
                        const resp = JSON.parse(msg.obj);
                        warpModal.warpData = resp.data;
                        warpModal.warpConfig = resp.config;
                        this.collectConfig();
                        if (!warpModal.warpOutbound) {
                            this.testError = 'WARP 配置无效';
                            continue;
                        }

                        this.testStatus = 'testing';
                        const result = await this.testWarpOutbound();
                        if (result.success) {
                            this.testDelay = result.delay;
                            this.testStatus = 'success';
                            Vue.prototype.$message.success(`WARP 可用，延迟 ${result.delay}ms`);
                            return;
                        }
                        this.testError = result.error || 'WARP 节点不可用';
                    }
                    await HttpUtil.post('/panel/xray/warp/del');
                    warpModal.warpData = null;
                    warpModal.warpConfig = null;
                    warpModal.warpOutbound = null;
                    this.testStatus = 'failed';
                    this.testError = '连续申请 10 次仍不可用，请稍后再试';
                    Vue.prototype.$message.error(this.testError);
                } catch (error) {
                    this.testStatus = 'failed';
                    this.testError = error.message || 'WARP 申请或测试失败';
                    Vue.prototype.$message.error(this.testError);
                } finally {
                    warpModal.loading(false);
                }
            },
            async updateLicense(l) {
                warpModal.loading(true);
                const msg = await HttpUtil.post('/panel/xray/warp/license', {
                    license: l
                });
                if (msg.success) {
                    warpModal.warpData = JSON.parse(msg.obj);
                    warpModal.warpConfig = null;
                    this.warpPlus = '';
                }
                warpModal.loading(false);
            },
            async getConfig() {
                warpModal.loading(true);
                this.resetTestState();
                try {
                    const msg = await HttpUtil.post('/panel/xray/warp/config');
                    if (msg.success) {
                        warpModal.warpConfig = JSON.parse(msg.obj);
                        this.collectConfig();
                        if (!warpModal.warpOutbound) {
                            this.testError = 'WARP 配置无效';
                            this.testStatus = 'failed';
                            return;
                        }
                        this.testStatus = 'testing';
                        const result = await this.testWarpOutbound();
                        if (result.success) {
                            this.testDelay = result.delay;
                            this.testError = '';
                            this.testStatus = 'success';
                        } else {
                            this.testError = result.error || 'WARP 当前不可用';
                            this.testStatus = 'failed';
                        }
                    }
                } catch (error) {
                    this.testError = error.message || 'WARP 测试失败';
                    this.testStatus = 'failed';
                } finally {
                    warpModal.loading(false);
                }
            },
            async delConfig() {
                warpModal.loading(true);
                const msg = await HttpUtil.post('/panel/xray/warp/del');
                warpModal.loading(false);
                if (msg.success) {
                    warpModal.warpData = null;
                    warpModal.warpConfig = null;
                    this.resetTestState();
                    this.delOutbound();
                }
            },
            addOutbound() {
                app.templateSettings.outbounds.push(warpModal.warpOutbound.toJson());
                app.outboundSettings = JSON.stringify(app.templateSettings.outbounds);
                warpModal.close();
            },
            resetOutbound() {
                app.templateSettings.outbounds[this.warpOutboundIndex] = warpModal.warpOutbound.toJson();
                app.outboundSettings = JSON.stringify(app.templateSettings.outbounds);
                warpModal.close();
            },
            delOutbound() {
                if (this.warpOutboundIndex != -1) {
                    app.templateSettings.outbounds.splice(this.warpOutboundIndex, 1);
                    app.outboundSettings = JSON.stringify(app.templateSettings.outbounds);
                }
                warpModal.close();
            }
        },
        computed: {
            warpOutboundIndex: {
                get: function() {
                    return app.templateSettings ? app.templateSettings.outbounds.findIndex((o) => o.tag ==
                        'warp') : -1;
                }
            },
            warpReady: {
                get: function() {
                    return !!warpModal.warpOutbound && this.testStatus === 'success';
                }
            }
        }
    });
</script>
{{end}}
